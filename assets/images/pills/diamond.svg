<svg xmlns="http://w3.org" viewBox="0 0 200 200">
    <!-- Left Side Shadow -->
    <polygon class="pill-side-dark" points="40,100 100,145 100,165 40,120" />
    <!-- Right Side Shadow -->
    <polygon class="pill-side-light" points="100,145 160,100 160,120 100,165" />
    <!-- Top Face -->
    <polygon class="pill-top" points="100,45 160,100 100,145 40,100" />
    <!-- Outlines -->
    <polygon class="pill-line" points="100,45 160,100 100,145 40,100" />
    <path class="pill-line" d="M 40,100 L 40,120 L 100,165 L 160,120 L 160,100" />
    <line class="pill-line" x1="100" y1="145" x2="100" y2="165" />
</svg>
