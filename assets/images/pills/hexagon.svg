<svg xmlns="http://w3.org" viewBox="0 0 200 200">
    <!-- Left Side Shadow -->
    <polygon class="pill-side-dark" points="40,100 70,140 70,160 40,120" />
    <!-- Center Side Shadow -->
    <polygon class="pill-side-light" points="70,140 130,140 130,160 70,160" />
    <!-- Right Side Shadow -->
    <polygon class="pill-side-light" points="130,140 160,100 160,120 130,160" />
    <!-- Top Face -->
    <polygon class="pill-top" points="70,60 130,60 160,100 130,140 70,140 40,100" />
    <!-- Outlines -->
    <polygon class="pill-line" points="70,60 130,60 160,100 130,140 70,140 40,100" />
    <path class="pill-line" d="M 40,100 L 40,120 L 70,160 L 130,160 L 160,120 L 160,100" />
    <line class="pill-line" x1="70" y1="140" x2="70" y2="160" />
    <line class="pill-line" x1="130" y1="140" x2="130" y2="160" />
</svg>
